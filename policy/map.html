var map = L.map('map').setView([33.52, -112.07], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);

function shade(c){ return c>=12?'#b8860b': c>=8?'#d9b310': c>=4?'#f0d43a': c>=1?'#fded97':'#f6f5e8'; }
var counts = Object.keys(D.dd).map(function(k){return D.dd[k].count;});
var maxc = counts.length?Math.max.apply(null,counts):0;

var dlayer = L.geoJSON(D.districts, {
  style: function(f){ var n=f.properties.DISTRICT; var e=D.dd[n]; var c=e?e.count:0;
    return {color:'#040404', weight:1.4, fillColor:shade(c), fillOpacity:.62}; },
  onEachFeature: function(f, layer){
    var p=f.properties, n=p.DISTRICT, e=D.dd[n]||{count:0,Housing:0,Heat:0,Transit:0,Walkability:0};
    var rep=p.REP_NAME?('<div class="pp-rep">'+p.REP_NAME+(p.REP_URL?' · <a href="'+p.REP_URL+'" target="_blank">contact ↗</a>':'')+'</div>'):'';
    layer.bindPopup('<div class="pp"><span class="pp-d">District '+n+'</span>'+rep+
      '<div class="pp-s"><b>'+e.count+'</b> tracked items<br>'+
      'Housing '+e.Housing+' · Transit '+e.Transit+' · Walkability '+e.Walkability+' · Heat '+e.Heat+'</div></div>');
    layer.on('mouseover',function(){layer.setStyle({weight:3});});
    layer.on('mouseout',function(){dlayer.resetStyle(layer);});
  }
}).addTo(map);
if(D.districts.features.length){ try{ map.fitBounds(dlayer.getBounds(),{padding:[10,10]}); }catch(e){} }

D.pins.forEach(function(p){
  L.circleMarker([p.lat,p.lng],{radius:6,color:'#fff',weight:1.5,fillColor:p.color,fillOpacity:.95})
   .addTo(map)
   .bindPopup('<div class="pp"><span class="pp-t">'+p.title.replace(/</g,'&lt;')+'</span>'+
     '<span class="pp-m">'+p.city+(p.topics?' · '+p.topics:'')+(p.status?' · '+p.status.replace(/</g,'&lt;'):'')+'</span>'+
     '<div class="pp-s">'+p.summary.replace(/</g,'&lt;')+'</div>'+
     '<a href="'+p.url+'" target="_blank">Official record ↗</a> &nbsp; <a href="'+p.news+'" target="_blank">News ↗</a></div>');
});

lg.onAdd = function(){ var d=L.DomUtil.create('div','legend');

lg.addTo(map);
