name: policy-tracker

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tracker
        run: python3 track.py

      - name: Run council voting records
        run: python3 council.py

      - name: Publish to policy/
        run: |
          mkdir -p policy
          cp site/index.html      policy/index.html
          cp site/map.html        policy/map.html
          cp site/ordinances.json policy/ordinances.json
          cp site/digest.txt      policy/digest.txt
          cp site/council.html    policy/council.html

      - name: Commit if changed
        run: |
          git config user.name  "policy-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add policy/ state.json archive.json geocache.json districts.geojson council_votes.json council_state.json members.json
          git diff --staged --quiet || git commit -m "Update policy tracker $(date -u +%Y-%m-%d)"
          git push
